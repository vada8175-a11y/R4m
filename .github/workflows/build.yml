name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y git wget unzip python3-pip python3-dev libffi-dev libssl-dev autoconf automake cmake libtool pkg-config ninja-build ccache zlib1g-dev openjdk-17-jdk gradle
    
    - name: Upgrade pip
      run: pip install --upgrade pip
    
    - name: Install Cython
      run: pip install Cython
    
    - name: Install buildozer
      run: pip install buildozer
    
    - name: Create buildozer.spec
      run: |
        echo "[app]" > buildozer.spec
        echo "title = R4Mesg" >> buildozer.spec
        echo "package.name = r4mesg" >> buildozer.spec
        echo "package.domain = com.r4mesg.app" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,txt" >> buildozer.spec
        echo "version = 1.0.0" >> buildozer.spec
        echo "requirements = python3,kivy,requests,websocket-client,pyopenssl,ssl" >> buildozer.spec
        echo "orientation = portrait" >> buildozer.spec
        echo "fullscreen = 0" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[android]" >> buildozer.spec
        echo "api = 33" >> buildozer.spec
        echo "minapi = 21" >> buildozer.spec
        echo "ndk = 25b" >> buildozer.spec
        echo "sdk = 34" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.permissions = INTERNET,ACCESS_NETWORK_STATE" >> buildozer.spec
        echo "android.debug = True" >> buildozer.spec
    
    - name: Create assets folder
      run: mkdir -p assets
    
    - name: Create splash.png
      run: touch assets/splash.png
    
    - name: Create icon.png
      run: touch assets/icon.png
    
    - name: Build APK
      run: buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: R4Mesg-APK
        path: bin/*.apk
