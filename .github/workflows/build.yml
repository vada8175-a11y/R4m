name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y git wget unzip python3-pip python3-dev libffi-dev libssl-dev autoconf automake cmake libtool pkg-config ninja-build ccache zlib1g-dev openjdk-17-jdk gradle
    
    - name: Download and setup Android SDK (legacy structure)
      run: |
        # Создаем структуру, которую ожидает buildozer
        mkdir -p $ANDROID_HOME/tools/bin
        
        # Скачиваем старую версию SDK tools (совместимую с buildozer)
        wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
        unzip -q sdk-tools-linux-4333796.zip -d $ANDROID_HOME/
        rm sdk-tools-linux-4333796.zip
        
        # Проверяем что установилось
        ls -la $ANDROID_HOME/tools/bin/
    
    - name: Accept Android licenses
      run: |
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses
    
    - name: Install required Android SDK components
      run: |
        yes | $ANDROID_HOME/tools/bin/sdkmanager "platform-tools"
        yes | $ANDROID_HOME/tools/bin/sdkmanager "platforms;android-33"
        yes | $ANDROID_HOME/tools/bin/sdkmanager "build-tools;30.0.3"
    
    - name: Upgrade pip
      run: pip install --upgrade pip
    
    - name: Install Cython and buildozer
      run: |
        pip install Cython
        pip install buildozer
    
    - name: Create buildozer.spec
      run: |
        echo "[app]" > buildozer.spec
        echo "title = R4Mesg" >> buildozer.spec
        echo "package.name = r4mesg" >> buildozer.spec
        echo "package.domain = com.r4mesg.app" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,txt" >> buildozer.spec
        echo "version = 1.0.0" >> buildozer.spec
        echo "requirements = python3,kivy,requests,websocket-client,pyopenssl,ssl" >> buildozer.spec
        echo "orientation = portrait" >> buildozer.spec
        echo "fullscreen = 0" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[android]" >> buildozer.spec
        echo "api = 33" >> buildozer.spec
        echo "minapi = 21" >> buildozer.spec
        echo "ndk = 25b" >> buildozer.spec
        echo "sdk = 34" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.permissions = INTERNET,ACCESS_NETWORK_STATE" >> buildozer.spec
        echo "android.debug = True" >> buildozer.spec
    
    - name: Create assets folder
      run: |
        mkdir -p assets
        touch assets/splash.png
        touch assets/icon.png
    
    - name: Build APK
      run: buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: R4Mesg-APK
        path: bin/*.apk
