name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y git wget unzip python3-pip python3-dev libffi-dev libssl-dev autoconf automake cmake libtool pkg-config ninja-build ccache zlib1g-dev openjdk-17-jdk gradle
    
    - name: Install Python packages
      run: |
        pip install --upgrade pip
        pip install Cython
        pip install buildozer
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = R4Mesg
package.name = r4mesg
package.domain = com.r4mesg.app
source.dir = .
source.include_exts = py,png,jpg,kv,txt
version = 1.0.0
requirements = python3,kivy,requests,websocket-client,pyopenssl,ssl
orientation = portrait
fullscreen = 0
[buildozer]
log_level = 2
[android]
api = 33
minapi = 21
ndk = 25b
sdk = 34
android.accept_sdk_license = True
android.permissions = INTERNET,ACCESS_NETWORK_STATE
android.debug = True
EOF
    
    - name: Create assets
      run: |
        mkdir -p assets
        touch assets/splash.png
        touch assets/icon.png
    
    - name: Build APK
      run: buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: R4Mesg-APK
        path: bin/*.apk 
