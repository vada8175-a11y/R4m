name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y git wget unzip python3-pip python3-dev libffi-dev libssl-dev autoconf automake cmake libtool pkg-config ninja-build ccache zlib1g-dev openjdk-17-jdk gradle
    
    - name: Download and setup Android SDK
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        rm commandlinetools-linux-9477386_latest.zip
    
    - name: Create compatibility links for buildozer
      run: |
        # Создаем структуру папок, которую ожидает buildozer
        mkdir -p $ANDROID_HOME/tools/bin
        # Создаем символические ссылки
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager
        # Также создаем ссылку в старый путь tools/
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin $ANDROID_HOME/tools/
        echo "✅ Compatibility links created"
    
    - name: Verify SDK installation
      run: |
        echo "=== ANDROID_HOME content ==="
        ls -la $ANDROID_HOME
        echo ""
        echo "=== tools/bin content ==="
        ls -la $ANDROID_HOME/tools/bin/ || echo "tools/bin not found"
        echo ""
        echo "=== Which sdkmanager ==="
        which sdkmanager || echo "sdkmanager not in PATH"
    
    - name: Accept Android licenses
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        mkdir -p "$ANDROID_HOME/licenses"
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$ANDROID_HOME/licenses/android-sdk-license"
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$ANDROID_HOME/licenses/android-sdk-license"
        echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_HOME/licenses/android-sdk-preview-license"
        echo "504667f4c0de7af1a06de9f4b1727b84351f2910" >> "$ANDROID_HOME/licenses/android-sdk-preview-license"
        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses
    
    - name: Install Android SDK components
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --sdk_root=$ANDROID_HOME "build-tools;30.0.3"
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33"
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools"
    
    - name: Upgrade pip
      run: pip install --upgrade pip
    
    - name: Install Cython
      run: pip install Cython
    
    - name: Install buildozer
      run: pip install buildozer
    
    - name: Create buildozer.spec
      run: |
        echo "[app]" > buildozer.spec
        echo "title = R4Mesg" >> buildozer.spec
        echo "package.name = r4mesg" >> buildozer.spec
        echo "package.domain = com.r4mesg.app" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,txt" >> buildozer.spec
        echo "version = 1.0.0" >> buildozer.spec
        echo "requirements = python3,kivy,requests,websocket-client,pyopenssl,ssl" >> buildozer.spec
        echo "orientation = portrait" >> buildozer.spec
        echo "fullscreen = 0" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[android]" >> buildozer.spec
        echo "api = 33" >> buildozer.spec
        echo "minapi = 21" >> buildozer.spec
        echo "ndk = 25b" >> buildozer.spec
        echo "sdk = 34" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.permissions = INTERNET,ACCESS_NETWORK_STATE" >> buildozer.spec
        echo "android.debug = True" >> buildozer.spec
        # Добавляем явные пути
        echo "android.sdk_path = $ANDROID_HOME" >> buildozer.spec
        echo "android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b" >> buildozer.spec
        echo "android.ant_path = /home/runner/.buildozer/android/platform/apache-ant-1.9.4" >> buildozer.spec
    
    - name: Create assets folder
      run: mkdir -p assets
    
    - name: Create splash.png
      run: touch assets/splash.png
    
    - name: Create icon.png
      run: touch assets/icon.png
    
    - name: Build APK
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: R4Mesg-APK
        path: bin/*.apk
