name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y git wget unzip python3-pip python3-dev libffi-dev libssl-dev autoconf automake cmake libtool pkg-config ninja-build ccache zlib1g-dev openjdk-17-jdk gradle
    
    - name: Download and setup Android SDK command line tools
      run: |
        mkdir -p $ANDROID_HOME/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_HOME/cmdline-tools
        mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        rm commandlinetools-linux-11076708_latest.zip
    
    - name: Accept Android licenses
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses
    
    - name: Install required Android SDK components
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools"
        yes | sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-33"
        yes | sdkmanager --sdk_root=$ANDROID_HOME "build-tools;33.0.2"
    
    - name: Upgrade pip
      run: pip install --upgrade pip
    
    - name: Install Cython and buildozer
      run: |
        pip install Cython
        pip install buildozer
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = R4Mesg
package.name = r4mesg
package.domain = com.r4mesg.app
source.dir = .
source.include_exts = py,png,jpg,kv,txt
version = 1.0.0
requirements = python3,kivy,requests,websocket-client,pyopenssl,ssl
orientation = portrait
fullscreen = 0

[buildozer]
log_level = 2

[android]
api = 33
minapi = 21
ndk = 25b
sdk = 34
android.accept_sdk_license = True
android.permissions = INTERNET,ACCESS_NETWORK_STATE
android.debug = True
EOF
    
    - name: Create assets folder
      run: mkdir -p assets && touch assets/splash.png assets/icon.png
    
    - name: Build APK
      run: |
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: R4Mesg-APK
        path: bin/*.apk
