name: Build APK with Buildozer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Явно указываем использовать Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # Обновляем checkout до v4 (поддержка Node.js 20+)
    - name: Checkout code
      uses: actions/checkout@v4
    
    # Обновляем setup-python до v5 (поддержка Node.js 20+)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # Обновляем до Python 3.11
        cache: 'pip'  # Включаем кэширование для ускорения
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          wget \
          unzip \
          python3-pip \
          python3-dev \
          python3-venv \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          cmake \
          libtool \
          pkg-config \
          ninja-build \
          ccache \
          zlib1g-dev \
          openjdk-17-jdk \
          gradle \
          libstdc++-12-dev
    
    - name: Install Cython and Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install Cython==3.0.10  # Обновляем Cython
        pip install buildozer
        
    - name: Verify installations
      run: |
        python --version
        pip --version
        buildozer --version
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
[app]
title = R4Mesg
package.name = r4mesg
package.domain = com.r4mesg.app

source.dir = .
source.include_exts = py,png,jpg,kv,atlas,txt

version = 1.0.0
version.regex = __version__ = ['"](.*)['"]
version.filename = %(source.dir)s/main.py

requirements = python3,kivy==2.3.0,requests==2.31.0,websocket-client==1.8.0,pyopenssl==24.2.1,ssl,certifi,urllib3,charset-normalizer,idna

presplash.filename = %(source.dir)s/assets/splash.png
icon.filename = %(source.dir)s/assets/icon.png

orientation = portrait
osx.python_version = 3
osx.kivy_version = 2.3.0
fullscreen = 0

[buildozer]
log_level = 2
warn_on_root = 1

[requirements]
# Поддержка 64-битных устройств (современные телефоны)
android.archs = arm64-v8a

[android]
api = 33
minapi = 21
ndk = 25c
ndk_version = 25c
sdk = 34
android.accept_sdk_license = True
android.gradle_dependencies = 'org.java-websocket:Java-WebSocket:1.5.3'
android.permissions = INTERNET,ACCESS_NETWORK_STATE
android.add_src = websocket
android.extra_src = websocket

# Для отладки
android.debug = True
EOF
    
    - name: Create dummy assets if missing
      run: |
        mkdir -p assets
        # Создаем заглушки для изображений, если их нет
        if [ ! -f assets/splash.png ]; then
          echo "Creating dummy splash.png"
          sudo apt-get install -y imagemagick
          convert -size 480x800 xc:blue assets/splash.png
        fi
        if [ ! -f assets/icon.png ]; then
          echo "Creating dummy icon.png"
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:blue assets/icon.png
        fi
        ls -la assets/
    
    - name: Build with Buildozer
      run: |
        # Инициализируем buildozer если нужно
        buildozer init
        # Запускаем сборку
        buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: R4Mesg-APK-$(date +%Y%m%d)
        path: bin/*.apk
        if-no-files-found: error  # Сообщить об ошибке, если APK не создан
    
    - name: Upload build logs if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .buildozer/android/platform/build-arm64-v8a/dists/r4mesg__armeabi-v7a/build/outputs/logs/*
          buildozer.log
